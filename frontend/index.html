<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grace AI Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
    }

    .app {
      width: 100%;
      max-width: 900px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .top-bar {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .top-bar h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .top-bar p {
      margin-top: 6px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.65);
    }

    #chat-box {
      flex: 1;
      padding: 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message {
  max-width: 72%;
  padding: 16px 20px;
  border-radius: 18px;
  line-height: 1.7;
  font-size: 1rem;
  white-space: pre-wrap;
  word-wrap: break-word;
}

    .user-row {
      justify-content: flex-end;
    }

    .user {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .ai-row {
      justify-content: flex-start;
    }

    .ai {
      background: rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 6px;
    }

    .input-area {
      padding: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 10px;
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1rem;
      padding: 10px 12px;
    }

    #message-input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    #send-btn {
      border: none;
      outline: none;
      background: linear-gradient(135deg, #2563eb, #60a5fa);
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    #send-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    #send-btn:active {
      transform: scale(0.98);
    }

   #send-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
    }
    @media (max-width: 768px) {
      .app {
        height: 95vh;
        border-radius: 18px;
      }

      .message {
        max-width: 88%;
        font-size: 0.95rem;
      }

      .top-bar h1 {
        font-size: 1.15rem;
      }

      .top-bar p {
        font-size: 0.85rem;
      }

      #send-btn {
        padding: 10px 14px;
      }
      
      .quick-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 0 24px 18px;
    padding: 0 18px 14px;
  gap: 10px;
}

.action-btn {
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.08);
  color: #f8fafc;
  padding: 10px 14px;
  border-radius: 999px;
  font-size: 0.92rem;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    font-size: 0.85rem;
  padding: 9px 12px;
}

.action-btn:hover {
  transform: translateY(-1px);
  background: rgba(255, 255, 255, 0.14);
}

.action-btn:active {
  transform: scale(0.98);
}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1>Grace AI Assistant</h1>
<p>A gentle church companion for prayer, scripture, and encouragement.</p>
    </div>

    <div id="chat-box"></div>

<div class="quick-actions">
  <button class="action-btn" data-message="Please pray for me.">🙏 Pray for me</button>
  <button class="action-btn" data-message="Please give me a Bible verse for strength and hope.">📖 Give me a Bible verse</button>
  <button class="action-btn" data-message="Please encourage me with a short faith-filled message.">✨ Encourage me</button>
</div>

<div class="input-area">

    
  </div>

  <script>
  const chatBox = document.getElementById("chat-box");
  const messageInput = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const actionButtons = document.querySelectorAll(".action-btn");

actionButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const presetMessage = button.getAttribute("data-message");
    sendMessage(presetMessage);
  });
});

function showWelcomeMessage() {
  addMessage(
    "Welcome. I’m Grace, here to offer prayer, scripture, and encouragement. How can I support you today?",
    "ai"
  );
}

  function addMessage(text, sender) {
    const row = document.createElement("div");
    row.classList.add("message-row", sender === "user" ? "user-row" : "ai-row");

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message", sender);
    messageDiv.textContent = text;

    row.appendChild(messageDiv);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function addTypingIndicator() {
    const row = document.createElement("div");
    row.classList.add("message-row", "ai-row");
    row.id = "typing-row";

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message", "ai");
    messageDiv.id = "typing-indicator";
    messageDiv.textContent = "Twin AI is typing...";

    row.appendChild(messageDiv);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function removeTypingIndicator() {
    const typingRow = document.getElementById("typing-row");
    if (typingRow) typingRow.remove();
  }
  async function sendMessage(customMessage = null) {
  const message = customMessage || messageInput.value.trim();

  if (!message) return;

  addMessage(message, "user");

  if (!customMessage) {
    messageInput.value = "";
  } else {
    messageInput.value = "";
  }

  sendBtn.disabled = true;
  addTypingIndicator();

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    removeTypingIndicator();

    if (data.reply) {
      addMessage(data.reply, "ai");
    } else {
      addMessage("Something went wrong.", "ai");
    }
  } catch (error) {
    console.error(error);
    removeTypingIndicator();
    addMessage("Could not connect to Grace right now.", "ai");
  } finally {
    sendBtn.disabled = false;
    messageInput.focus();
  }
}
 
  
</script>
</body>
</html>
